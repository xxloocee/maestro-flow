name: CI

on:
  pull_request:
  push:
    branches: [main, master]

permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"
          pip install build
      - name: Run unit and integration tests
        run: python -m pytest -q
      - name: Run release smoke tests
        run: python -m pytest -q tests/test_release_smoke.py
      - name: Build package
        run: python -m build

  maestro-gate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"
      - name: Run Maestro (mock)
        id: maestro_run
        shell: bash
        run: |
          OUTPUT=$(python -m maestro_flow.cli run --mock --skip-gates --requirement "PR review: ${{ github.event.pull_request.title }}")
          echo "$OUTPUT"
          RUN_ID=$(echo "$OUTPUT" | sed -n 's/^run_id: //p' | tr -d '[:space:]')
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"
      - name: Evaluate Maestro Gate
        run: |
          python -m maestro_flow.cli ci evaluate --run-id "${{ steps.maestro_run.outputs.run_id }}"
      - name: Post/Update PR Comment
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python -m maestro_flow.cli ci comment \
            --run-id "${{ steps.maestro_run.outputs.run_id }}" \
            --pr-number "${{ github.event.pull_request.number }}"
